<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Booth Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #222;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<model-viewer
  src="booth.glb"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  camera-orbit="0deg 75deg 3m">
</model-viewer>

</body>
</html>
